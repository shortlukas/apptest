<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Work+Sans:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <script type="module" src="main.js"></script>

    
</head>
<body>
    <div id="frame">
        <div id="screens">
            <div id="home" class="screen">
                <div class="content-box">
                    <div class="content header">
                        <span>Alarms</span>
                        <div class="end-container"><span style="font-size: 20px">Add</span></div>
                    </div>
                    <div id="home-alarms-container"></div>
                </div>
                <div class="content-box">
                    <div class="content header">
                        <span>Reminders</span>
                        <div class="end-container">
                            <div id="add-reminder-btn" class="btn-container"><span style="font-size: 20px">Add</span></div>
                        </div>
                    </div>
                    <div id="home-reminders-container"></div>
                </div>
            </div>
            <div id="reminders" class="screen">
                <div class="content-box">
                    <div class="content header">
                        <span style="font-size: 20px">Edit</span>
                        <div class="end-container"><span style="font-size: 20px">Add</span></div>
                    </div>
                    <div id="reminders-container"></div>
                </div>
                <div class="content-box">
                    <div class="content header">
                        <span>Recent Reminders</span>
                    </div>
                    <div id="recent-reminders-container"></div>
                </div>
            </div>
            <div id="alarms" class="screen">
                <div class="content-box">
                    <div class="content header">
                        <span style="font-size: 20px">Edit</span>
                        <div class="end-container"><span style="font-size: 20px">Add</span></div>
                    </div>
                    <div id="alarms-container"></div>
                </div>
                <div class="content-box">
                    <div class="content header">
                        <span>Recent Alarms</span>
                    </div>
                    <div id="recent-alarms-container"></div>
                </div>
            </div>
            <div id="settings" class="screen">
                <div class="content-box">
                    <div class="content header">
                        <span style="font-size: 20px">Settings</span>
                    </div>
                    <div class="content setting">
                        <span>General</span>
                        <div class="end-container"><img id="general-btn" src="./images/right-arrow.png" class="icon-40"></div>
                    </div>
                    <div class="content setting">
                        <span>Accessibility</span>
                        <div class="end-container"><img id="accessibility-btn" src="./images/right-arrow.png" class="icon-40"></div>
                    </div>
                    <div class="content setting">
                        <span style="flex-shrink: 0">Control Center</span>
                        <div class="end-container"><img id="controlcenter-btn" src="./images/right-arrow.png" class="icon-40"></div>
                    </div>
                    <div class="content setting">
                        <span>Display</span>
                        <div class="end-container"><img id="display-btn" src="./images/right-arrow.png" class="icon-40"></div>
                    </div>

                </div>
            </div>
            <div id="user" class="screen">
                <div class="content-box">
                    <div class="content notice">
                        <span class="noticetxt">Nothing here yet</span>
                    </div>
                </div>
            </div>
        </div>
        <div id="settings-general" class="screen popup">
            <div class="content-box">
                <div class="content header">
                    <span style="font-size: 20px">General</span>
                    <div class="end-container">
                        <div id=back-btn class="btn-container back-btn"><span style="font-size: 20px">Back</span></div>
                    </div>
                </div>
                <div class="content notice">
                    <span class="noticetxt">You found the general settings!</span>
                </div>
            </div>
        </div>
        <div id="reminders-add" class="screen popup">
            <div class="content-box">
                <div class="content header">
                    <span style="font-size: 20px; flex-shrink: 0">Create Reminder</span>
                    <div class="end-container">
                        <div id=back-btn class="btn-container back-btn"><span style="font-size: 20px">Back</span></div>
                    </div>
                </div>
                <div class="content">
                    <span style="font-size: 16px; flex-shrink: 0">Edit Description</span>
                    <div class="end-container">
                        <input id="reminder-add-desc" class="text-input" placeholder="Edit...">
                    </div>
                </div>
                <div class="content">
                    <span>Hey</span>
                </div>
            </div>
        </div>
        <div id="nav">
            <div id="home-btn" class="nav-btn"><img id="home-icon" src="./images/home-select.png"class="icon-50"></div>
            <div id="reminders-btn" class="nav-btn"><img id="reminders-icon" src="./images/reminders.png"class="icon-50"></div>
            <div id="alarms-btn" class="nav-btn"><img id="alarms-icon" src="./images/alarms.png"class="icon-50"></div>
            <div id="settings-btn" class="nav-btn"><img id="settings-icon" src="./images/settings.png"class="icon-50"></div>
            <div id="user-btn" class="nav-btn"><img id="user-icon" src="./images/user.png"class="icon-50"></div>
        </div>
    </div>
</body>
</html>
